<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信文章预览 - 课程推广 (营销风格)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f2f2f2; padding-top: 60px; font-family: -apple-system, sans-serif; }
    #preview-toolbar { position: fixed; top: 0; left: 0; right: 0; height: 52px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .toolbar-modes { display: flex; gap: 4px; }
    .mode-btn { padding: 6px 14px; border: 1px solid #e0e0e0; border-radius: 20px; background: #fff; font-size: 13px; cursor: pointer; color: #555; transition: all .2s; }
    .mode-btn.active { background: #07c160; border-color: #07c160; color: #fff; }
    #copy-btn { padding: 7px 18px; background: #07c160; color: #fff; border: none; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; }
    #copy-btn.copied { background: #4caf50; }
    #preview-wrap { display: flex; justify-content: center; padding: 24px 16px 48px; min-height: 100vh; }
    #preview-container { width: 100%; max-width: 677px; transition: max-width .3s ease; background: transparent; }
    #preview-container.mobile { max-width: 390px; }
    #article-content { background: #ffffff; }
  </style>
</head>
<body>
  <div id="preview-toolbar">
    <div class="toolbar-modes">
      <button class="mode-btn active" onclick="setMode('pc')" id="btn-pc">🖥 网页</button>
      <button class="mode-btn" onclick="setMode('mobile')" id="btn-mobile">📱 手机</button>
    </div>
    <button id="copy-btn" onclick="copyArticle()">📋 复制到公众号</button>
  </div>
  <div id="preview-wrap">
    <div id="preview-container">
      <div id="article-content">
        <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin: 0 auto; background-color: #ffffff; color: #333333; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;">
          <tr>
            <td style="padding: 0; border: none;">
              <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; background-color: #e60012; color: #fff;">
                <tr>
                  <td style="padding: 30px 20px; border: none; text-align: center;">
                    <div style="font-size: 26px; font-weight: bold; margin-bottom: 10px; letter-spacing: 2px;">零基础自媒体爆款大课</div>
                    <div style="font-size: 16px; opacity: 0.9;">7天打破流量瓶颈，抢占内容红利时代</div>
                  </td>
                </tr>
              </table>
              <div style="padding: 24px; padding-bottom: 0;">
                <div style="font-size: 18px; font-weight: bold; color: #e60012; margin-bottom: 20px; text-align: center;">四大硬核课程亮点</div>
                
                <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 15px; border-collapse: separate; border-spacing: 0; background-color: #fffafb; border: 1px solid #ffd0d3; border-radius: 6px;">
                  <tr>
                    <td style="width: 40px; padding: 15px; background-color: #e60012; color: #fff; text-align: center; font-weight: bold; font-size: 18px; border-radius: 6px 0 0 6px; border: none;">01</td>
                    <td style="padding: 15px; border: none; font-size: 15px; line-height: 1.6; color: #444;">爆款底层逻辑拆解，直击平台算法核心</td>
                  </tr>
                </table>
                <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 15px; border-collapse: separate; border-spacing: 0; background-color: #fffafb; border: 1px solid #ffd0d3; border-radius: 6px;">
                  <tr>
                    <td style="width: 40px; padding: 15px; background-color: #e60012; color: #fff; text-align: center; font-weight: bold; font-size: 18px; border-radius: 6px 0 0 6px; border: none;">02</td>
                    <td style="padding: 15px; border: none; font-size: 15px; line-height: 1.6; color: #444;">12套万能文案模板，小白直接套用出稿</td>
                  </tr>
                </table>
                <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 25px; border-collapse: separate; border-spacing: 0; background-color: #fffafb; border: 1px solid #ffd0d3; border-radius: 6px;">
                  <tr>
                    <td style="width: 40px; padding: 15px; background-color: #e60012; color: #fff; text-align: center; font-weight: bold; font-size: 18px; border-radius: 6px 0 0 6px; border: none;">03</td>
                    <td style="padding: 15px; border: none; font-size: 15px; line-height: 1.6; color: #444;">社群导师1V1改稿陪伴，直到获得正反馈</td>
                  </tr>
                </table>

                <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 20px; border-collapse: separate; border-spacing: 0; background-color: #fcebeb; border-radius: 8px;">
                  <tr>
                    <td style="padding: 20px; border: none; text-align: center;">
                      <div style="font-size: 16px; color: #666; margin-bottom: 5px;">原价 <del>￥999</del>，首发限时秒杀价</div>
                      <div style="font-size: 32px; font-weight: bold; color: #e60012; margin-bottom: 15px;">￥99 <span style="font-size: 14px; font-weight: normal;">/ 人</span></div>
                      <table border="0" cellpadding="0" cellspacing="0" style="margin: 0 auto; background-color: #e60012; border-radius: 25px;">
                        <tr>
                          <td style="padding: 12px 30px; font-size: 16px; font-weight: bold; color: #fff; text-align: center; border: none;">
                            立即扫码抢座
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </div>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </div>
  <script>
    function setMode(mode) {
      const container = document.getElementById('preview-container');
      document.getElementById('btn-pc').classList.toggle('active', mode === 'pc');
      document.getElementById('btn-mobile').classList.toggle('active', mode === 'mobile');
      container.classList.toggle('mobile', mode === 'mobile');
    }
    async function copyArticle() {
      const btn = document.getElementById('copy-btn');
      const content = document.getElementById('article-content');
      const clone = content.cloneNode(true);
      const html = clone.innerHTML;
      const originalText = btn.textContent;
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'text/html': new Blob([html], { type: 'text/html' }) })]);
      } catch (e) {
        const el = document.createElement('div');
        el.setAttribute('contenteditable', 'true');
        el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
        el.innerHTML = html;
        document.body.appendChild(el);
        const range = document.createRange();
        range.selectNodeContents(el);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand('copy');
        sel.removeAllRanges();
        document.body.removeChild(el);
      }
      btn.textContent = '✓ 已复制！';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = originalText; btn.classList.remove('copied'); }, 1500);
    }
  </script>
</body>
</html>
