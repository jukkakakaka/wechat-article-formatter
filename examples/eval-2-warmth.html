<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信文章预览 - 重叠的岁月 (温情风格)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f2f2f2; padding-top: 60px; font-family: -apple-system, sans-serif; }
    #preview-toolbar { position: fixed; top: 0; left: 0; right: 0; height: 52px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .toolbar-modes { display: flex; gap: 4px; }
    .mode-btn { padding: 6px 14px; border: 1px solid #e0e0e0; border-radius: 20px; background: #fff; font-size: 13px; cursor: pointer; color: #555; transition: all .2s; }
    .mode-btn.active { background: #07c160; border-color: #07c160; color: #fff; }
    #copy-btn { padding: 7px 18px; background: #07c160; color: #fff; border: none; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; }
    #copy-btn.copied { background: #4caf50; }
    #preview-wrap { display: flex; justify-content: center; padding: 24px 16px 48px; min-height: 100vh; }
    #preview-container { width: 100%; max-width: 677px; transition: max-width .3s ease; background: transparent; }
    #preview-container.mobile { max-width: 390px; }
    #article-content { background: #fdfaf6; }
  </style>
</head>
<body>
  <div id="preview-toolbar">
    <div class="toolbar-modes">
      <button class="mode-btn active" onclick="setMode('pc')" id="btn-pc">🖥 网页</button>
      <button class="mode-btn" onclick="setMode('mobile')" id="btn-mobile">📱 手机</button>
    </div>
    <button id="copy-btn" onclick="copyArticle()">📋 复制到公众号</button>
  </div>
  <div id="preview-wrap">
    <div id="preview-container">
      <div id="article-content">
        <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin: 0 auto; background-color: #fdfaf6; color: #5c4d44; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;">
          <tr>
            <td style="padding: 30px 20px; border: none;">
              <div style="font-size: 22px; font-weight: bold; color: #8c6a51; margin-bottom: 30px; text-align: left; letter-spacing: 1px;">重叠的岁月</div>
              <div style="font-size: 16px; line-height: 2.0; margin-bottom: 30px; text-indent: 2em;">
                在我年幼的记忆里，父亲的背影总是像一座岿然不动的山。他很少说话，只是用磨出老茧的双手，一点点托起我们这个家。
              </div>
              <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 30px; border-collapse: separate; border-spacing: 0;">
                <tr>
                  <td style="padding: 20px; border: none; border-left: 4px solid #d4a373; background-color: #faebd7;">
                    <div style="font-size: 15px; line-height: 1.8; color: #8c6a51; font-style: italic;">
                      "你总以为时间慢得仿佛没有尽头，直到你惊觉他已经白了满头。"
                    </div>
                  </td>
                </tr>
              </table>
              <div style="font-size: 16px; line-height: 2.0; margin-bottom: 30px; text-indent: 2em;">
                如今我也做了父亲。每当清晨看着孩子熟睡的脸庞，我总会突然读懂多年前，那个站在门边默默看着我出门时的沉默眼神。父子关系，或许就是一场漫长而无声的传承。
              </div>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </div>
  <script>
    function setMode(mode) {
      const container = document.getElementById('preview-container');
      document.getElementById('btn-pc').classList.toggle('active', mode === 'pc');
      document.getElementById('btn-mobile').classList.toggle('active', mode === 'mobile');
      container.classList.toggle('mobile', mode === 'mobile');
    }
    async function copyArticle() {
      const btn = document.getElementById('copy-btn');
      const content = document.getElementById('article-content');
      const clone = content.cloneNode(true);
      const html = clone.innerHTML;
      const originalText = btn.textContent;
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'text/html': new Blob([html], { type: 'text/html' }) })]);
      } catch (e) {
        const el = document.createElement('div');
        el.setAttribute('contenteditable', 'true');
        el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
        el.innerHTML = html;
        document.body.appendChild(el);
        const range = document.createRange();
        range.selectNodeContents(el);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand('copy');
        sel.removeAllRanges();
        document.body.removeChild(el);
      }
      btn.textContent = '✓ 已复制！';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = originalText; btn.classList.remove('copied'); }, 1500);
    }
  </script>
</body>
</html>
