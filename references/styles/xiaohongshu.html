<!-- ===== 小红书风 风格示例片段 ===== -->
<!-- 主色调：珊瑚粉 #ff5e72 / 奶油白 #fff9f9 / 浅粉辅助 #ffe4e8 -->
<!-- 特征：大圆角卡片、emoji 点缀、标签感标注、轻盈活泼 -->

<!-- 文章外层容器：奶油白底 -->
<table border="0" cellpadding="0" cellspacing="0" style="width: 100%;">
  <tr>
    <td style="background-color: #fff9f9; padding-top: 24px; padding-right: 18px; padding-bottom: 24px; padding-left: 18px; border: none;">

      <!-- 大圆角内容卡片 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 16px; border-collapse: separate; border-spacing: 0; border-radius: 16px;">
        <tr>
          <td style="background-color: #ffffff; border-radius: 16px; padding-top: 20px; padding-right: 20px; padding-bottom: 20px; padding-left: 20px; border-width: 1px; border-style: solid; border-color: #ffe4e8;">

            <!-- 卡片标题带 emoji -->
            <p style="font-size: 17px; font-weight: bold; color: #1a1a1a; margin-top: 0; margin-bottom: 12px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">🌸 小标题放这里</p>

            <!-- 正文 -->
            <p style="font-size: 15px; color: #555555; line-height: 1.85; margin-top: 0; margin-bottom: 10px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">正文内容，语气轻松，像在和朋友分享好物。多用短句，有亲切感。可以加一点点个人感受和情绪词，让读者有共鸣～</p>

            <!-- 标签行 -->
            <table border="0" cellpadding="0" cellspacing="0" style="margin-top: 12px;">
              <tr>
                <td style="border: none; padding-right: 8px;">
                  <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: separate; border-spacing: 0; border-radius: 20px;">
                    <tr>
                      <td style="background-color: #ffe4e8; color: #ff5e72; font-size: 12px; font-weight: bold; padding-top: 4px; padding-right: 12px; padding-bottom: 4px; padding-left: 12px; border: none; border-radius: 20px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; white-space: nowrap;"># 标签一</td>
                    </tr>
                  </table>
                </td>
                <td style="border: none; padding-right: 8px;">
                  <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: separate; border-spacing: 0; border-radius: 20px;">
                    <tr>
                      <td style="background-color: #ffe4e8; color: #ff5e72; font-size: 12px; font-weight: bold; padding-top: 4px; padding-right: 12px; padding-bottom: 4px; padding-left: 12px; border: none; border-radius: 20px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; white-space: nowrap;"># 标签二</td>
                    </tr>
                  </table>
                </td>
                <td style="border: none;">
                  <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: separate; border-spacing: 0; border-radius: 20px;">
                    <tr>
                      <td style="background-color: #ffe4e8; color: #ff5e72; font-size: 12px; font-weight: bold; padding-top: 4px; padding-right: 12px; padding-bottom: 4px; padding-left: 12px; border: none; border-radius: 20px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; white-space: nowrap;"># 标签三</td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>

          </td>
        </tr>
      </table>

      <!-- 亮色引用块（好物推荐/种草语气） -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 16px; border-collapse: separate; border-spacing: 0; border-radius: 12px;">
        <tr>
          <td style="background-color: #fff0f2; border-radius: 12px; padding-top: 14px; padding-right: 18px; padding-bottom: 14px; padding-left: 18px; border-width: 1px; border-style: solid; border-color: #ffcdd4;">
            <p style="font-size: 14px; color: #ff5e72; font-weight: bold; margin: 0; margin-bottom: 6px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">💕 姐妹们必看</p>
            <p style="font-size: 14px; color: #666666; line-height: 1.75; margin: 0; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">种草语气的核心内容，或者重要的使用建议、购买注意事项。</p>
          </td>
        </tr>
      </table>

      <!-- 波浪分割线 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-top: 8px; margin-bottom: 16px;">
        <tr>
          <td style="text-align: center; font-size: 18px; letter-spacing: 6px; color: #ffb3be; border: none;">· · · ✿ · · ·</td>
        </tr>
      </table>

    </td>
  </tr>
</table>
