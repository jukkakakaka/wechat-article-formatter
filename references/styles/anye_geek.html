<!-- ===== 暗夜极客 风格示例片段 ===== -->
<!-- ⚠️ 重要说明：全页深色背景在微信中不可靠（<div> 背景会被剥离）。 -->
<!-- 本风格采用【白底+深色强调】方案：白色主背景，用深色卡片和高亮色制造极客质感。 -->
<!-- 主色调：纯白底 #ffffff / 深灰卡片 #1e1e2e / 荧光紫 #a78bfa / 荧光青 #22d3ee -->
<!-- 特征：深色代码块感卡片、等宽字体强调、霓虹色高亮、极简线条 -->

<!-- 文章外层容器：白底 -->
<table border="0" cellpadding="0" cellspacing="0" style="width: 100%;">
  <tr>
    <td style="background-color: #ffffff; padding-top: 28px; padding-right: 20px; padding-bottom: 28px; padding-left: 20px; border: none;">

      <!-- 章节标题：终端风格 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 18px;">
        <tr>
          <td style="border: none;">
            <p style="font-size: 11px; color: #a78bfa; font-family: 'Courier New', Courier, monospace; margin: 0; margin-bottom: 4px; letter-spacing: 0.1em;">// SECTION</p>
            <p style="font-size: 18px; font-weight: bold; color: #111111; margin: 0; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; letter-spacing: 0.05em;">章节标题</p>
            <table border="0" cellpadding="0" cellspacing="0" style="margin-top: 6px;">
              <tr>
                <td style="width: 32px; height: 2px; background-color: #a78bfa; border: none; font-size: 0; line-height: 0;"> </td>
                <td style="width: 8px; height: 2px; background-color: #22d3ee; border: none; font-size: 0; line-height: 0;"> </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>

      <!-- 正文段落 -->
      <p style="font-size: 15px; color: #333333; line-height: 1.85; margin-top: 0; margin-bottom: 14px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">正文内容，克制而精准。行文逻辑清晰，减少修辞，注重信息密度。<span style="color: #a78bfa; font-weight: bold;">关键技术词汇</span>用紫色标注，和正文形成对比。</p>

      <!-- 深色代码/数据卡片（用 table 实现，背景稳定） -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-top: 16px; margin-bottom: 16px; border-collapse: separate; border-spacing: 0; border-radius: 8px;">
        <tr>
          <!-- 左侧色条 -->
          <td style="width: 3px; background-color: #a78bfa; border: none; border-radius: 8px 0 0 8px;"> </td>
          <td style="background-color: #1e1e2e; border-radius: 0 8px 8px 0; padding-top: 16px; padding-right: 18px; padding-bottom: 16px; padding-left: 16px; border: none;">
            <p style="font-size: 11px; color: #6b7280; font-family: 'Courier New', Courier, monospace; margin: 0; margin-bottom: 8px; letter-spacing: 0.08em;">TERMINAL OUTPUT</p>
            <p style="font-size: 14px; color: #e2e8f0; line-height: 1.7; margin: 0; font-family: 'Courier New', Courier, monospace; word-break: break-all;">$ <span style="color: #22d3ee;">run</span> --mode production<br>✓ <span style="color: #a78bfa;">核心数据或代码结论放这里</span><br>→ 配置信息或状态描述</p>
          </td>
        </tr>
      </table>

      <!-- 技术要点列表 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 16px; border-collapse: separate; border-spacing: 0; border-radius: 6px; border-width: 1px; border-style: solid; border-color: #e5e7eb;">
        <tr>
          <td style="padding-top: 14px; padding-right: 16px; padding-bottom: 14px; padding-left: 16px; border: none;">
            <p style="font-size: 13px; color: #a78bfa; font-family: 'Courier New', Courier, monospace; font-weight: bold; margin: 0; margin-bottom: 10px;">KEY POINTS</p>
            <p style="font-size: 14px; color: #374151; line-height: 1.75; margin: 0; margin-bottom: 6px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">▸ 要点一：简明扼要的关键信息</p>
            <p style="font-size: 14px; color: #374151; line-height: 1.75; margin: 0; margin-bottom: 6px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">▸ 要点二：另一个核心结论</p>
            <p style="font-size: 14px; color: #374151; line-height: 1.75; margin: 0; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">▸ 要点三：值得关注的细节</p>
          </td>
        </tr>
      </table>

      <!-- 分割线：渐变风格（用 table 实现） -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-top: 20px; margin-bottom: 20px;">
        <tr>
          <td style="width: 40%; height: 1px; background-color: #a78bfa; border: none; font-size: 0; line-height: 0;"> </td>
          <td style="width: 20%; text-align: center; color: #22d3ee; font-size: 14px; border: none; vertical-align: middle;">◆</td>
          <td style="width: 40%; height: 1px; background-color: #22d3ee; border: none; font-size: 0; line-height: 0;"> </td>
        </tr>
      </table>

    </td>
  </tr>
</table>
