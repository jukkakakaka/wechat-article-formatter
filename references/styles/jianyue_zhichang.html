<!-- ===== 简约职场 风格示例片段 ===== -->
<!-- 主色调：纯白 #ffffff / 炭灰 #333333 / 点缀蓝 #2b5fad -->
<!-- 特征：极简无装饰、清晰字阶、宽松行距、数字编号系统 -->

<!-- 文章外层容器：纯白底 -->
<table border="0" cellpadding="0" cellspacing="0" style="width: 100%;">
  <tr>
    <td style="background-color: #ffffff; padding-top: 28px; padding-right: 24px; padding-bottom: 28px; padding-left: 24px; border: none;">

      <!-- 章节标题：数字+文字，干净利落 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 16px;">
        <tr>
          <td style="border: none; vertical-align: middle; width: 36px;">
            <p style="font-size: 22px; font-weight: bold; color: #2b5fad; margin: 0; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">01</p>
          </td>
          <td style="border: none; vertical-align: middle; padding-left: 12px; border-left-width: 1px; border-left-style: solid; border-left-color: #e0e0e0;">
            <p style="font-size: 17px; font-weight: bold; color: #1a1a1a; margin: 0; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; letter-spacing: 0.03em;">章节标题</p>
          </td>
        </tr>
      </table>

      <!-- 正文段落：宽松行距，无缩进 -->
      <p style="font-size: 15px; color: #444444; line-height: 1.9; margin-top: 0; margin-bottom: 14px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">这是正文段落。简约职场风格以内容为主角，减少视觉噪音，让读者聚焦于文字本身。行距宽松，阅读舒适。</p>

      <!-- 关键信息高亮：低调下划线式 -->
      <p style="font-size: 15px; color: #444444; line-height: 1.9; margin-top: 0; margin-bottom: 14px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">遇到<span style="color: #2b5fad; font-weight: bold; border-bottom-width: 1px; border-bottom-style: solid; border-bottom-color: #2b5fad;">关键术语或核心结论</span>时，使用蓝色加粗下划线标注，克制而清晰。</p>

      <!-- 信息框：左边蓝线 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-top: 18px; margin-bottom: 18px;">
        <tr>
          <td style="background-color: #f0f4fb; border-left-width: 3px; border-left-style: solid; border-left-color: #2b5fad; padding-top: 12px; padding-right: 16px; padding-bottom: 12px; padding-left: 16px; border-top: none; border-right: none; border-bottom: none;">
            <p style="font-size: 14px; color: #2b5fad; font-weight: bold; margin: 0; margin-bottom: 4px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">📌 核心要点</p>
            <p style="font-size: 14px; color: #333333; line-height: 1.7; margin: 0; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">简要的关键信息或结论性句子放在这里，让读者一眼抓住重点。</p>
          </td>
        </tr>
      </table>

      <!-- 细分割线 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-top: 20px; margin-bottom: 20px;">
        <tr>
          <td style="height: 1px; background-color: #eeeeee; font-size: 0; line-height: 0; border: none;"> </td>
        </tr>
      </table>

    </td>
  </tr>
</table>
