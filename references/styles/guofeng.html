<!-- ===== 国风雅韵 风格示例片段 ===== -->
<!-- 主色调：朱砂红 #c0392b / 宣纸米 #f5f0e8 / 墨色 #2c2c2c -->
<!-- 特征：宣纸底色、印章感标题、水墨分割线、古典引用块 -->

<!-- 文章外层容器：宣纸底色 -->
<table border="0" cellpadding="0" cellspacing="0" style="width: 100%;">
  <tr>
    <td style="background-color: #f5f0e8; padding-top: 32px; padding-right: 24px; padding-bottom: 32px; padding-left: 24px; border: none;">

      <!-- 章节标题：印章感 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-bottom: 20px;">
        <tr>
          <td style="border: none; padding-top: 0; padding-bottom: 0; padding-left: 0; padding-right: 0;">
            <table border="0" cellpadding="0" cellspacing="0">
              <tr>
                <!-- 朱红竖条装饰 -->
                <td style="width: 4px; background-color: #c0392b; border: none; border-radius: 2px;"> </td>
                <td style="padding-left: 12px; border: none;">
                  <p style="font-size: 19px; font-weight: bold; color: #2c2c2c; font-family: 'PingFang SC','Microsoft YaHei',serif; letter-spacing: 0.08em; margin: 0;">章节标题</p>
                  <p style="font-size: 12px; color: #c0392b; margin-top: 3px; letter-spacing: 0.15em; font-family: 'PingFang SC','Microsoft YaHei',sans-serif;">SECTION TITLE</p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>

      <!-- 正文段落 -->
      <p style="font-size: 16px; color: #3a3028; line-height: 2; margin-top: 0; margin-bottom: 16px; text-indent: 2em; font-family: 'PingFang SC','Microsoft YaHei',serif;">正文内容，行距宽松，字里行间透着从容。古人云，读万卷书，行万里路。这里是正文示例文字，可根据实际内容替换。</p>

      <!-- 古典引用块 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-top: 20px; margin-bottom: 20px; border-collapse: separate; border-spacing: 0; border-left-width: 3px; border-left-style: solid; border-left-color: #c0392b; border-right-width: 3px; border-right-style: solid; border-right-color: #c0392b;">
        <tr>
          <td style="background-color: #ede8df; padding-top: 16px; padding-right: 20px; padding-bottom: 16px; padding-left: 20px; border: none;">
            <p style="font-size: 15px; color: #5a4a3a; line-height: 1.9; text-align: center; font-style: italic; font-family: 'PingFang SC','Microsoft YaHei',serif; margin: 0;">「引用的古诗词或金句放在这里，居中呈现更有仪式感」</p>
          </td>
        </tr>
      </table>

      <!-- 水墨风分割线 -->
      <table border="0" cellpadding="0" cellspacing="0" style="width: 100%; margin-top: 24px; margin-bottom: 24px;">
        <tr>
          <td style="border: none; text-align: center; color: #c0392b; font-size: 18px; letter-spacing: 12px;">❧ ✦ ❧</td>
        </tr>
      </table>

    </td>
  </tr>
</table>
